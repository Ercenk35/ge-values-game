// ─── HELPERS ───
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function formatTime(s) {
  return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
}

// Her çağrıldığında kartları yeniden oluşturup rastgele karıştırır
function buildDeck() {
  let cards = [];
  VALUE_IMAGES.slice(0, PAIRS).forEach((img, idx) => {
    cards.push({ id: Math.random(), pairId: idx, image: img });
    cards.push({ id: Math.random(), pairId: idx, image: img });
  });
  // Fisher-Yates ile tamamen rastgele sıralama
  return shuffle(cards);
}

// ─── VALUES GALLERY ───
function ValuesGallery({ time, onContinue }) {
  const [selected, setSelected] = useState(null);
  const FONT = "'Interstate', 'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif";

  if (selected !== null) {
    const val = VALUES_DATA[selected];
    return (
      <div style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "rgba(0,47,50,0.95)", backdropFilter: "blur(10px)", padding: 20 }}>
        <div style={{ maxWidth: 440, width: "100%", display: "flex", flexDirection: "column", alignItems: "center" }}>
          <img src={val.description} alt={val.name} style={{ width: "100%", maxWidth: 400, borderRadius: 16, boxShadow: "0 8px 40px rgba(0,0,0,0.5)" }} draggable={false} />
          <button onClick={() => setSelected(null)} style={{ marginTop: 20, padding: "12px 36px", background: "linear-gradient(135deg,#0080a4,#005a74)", border: "1px solid #3da1be", borderRadius: 30, color: "#bbd5e3", fontFamily: FONT, fontSize: "0.95rem", fontWeight: 600, cursor: "pointer" }}>
            ← Back to Values
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "rgba(0,47,50,0.95)", backdropFilter: "blur(10px)", padding: 20 }}>
      <div style={{ fontFamily: FONT, fontWeight: 700, fontSize: "1.6rem", color: "#8abd24", marginBottom: 6, textAlign: "center" }}>
        Explore Our Values
      </div>
      <div style={{ fontFamily: FONT, color: "#65adc7", fontSize: "0.95rem", marginBottom: 24, textAlign: "center" }}>
        Tap any value to learn more about it
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14, maxWidth: 360, width: "100%", marginBottom: 28 }}>
        {VALUES_DATA.map((val, i) => (
          <div key={i} onClick={() => setSelected(i)} style={{
            cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 8,
            padding: 12, borderRadius: 14, background: "rgba(0,128,164,0.12)", border: "1px solid rgba(61,161,190,0.25)",
            transition: "all 0.2s"
          }}>
            <div style={{ width: 64, height: 64, borderRadius: 12, overflow: "hidden", border: "2px solid #3da1be", background: "#fff" }}>
              <img src={val.icon} alt={val.name} style={{ width: "100%", height: "100%", objectFit: "contain" }} draggable={false} />
            </div>
            <div style={{ fontFamily: FONT, fontSize: "0.7rem", color: "#bbd5e3", fontWeight: 600, textAlign: "center" }}>{val.name}</div>
          </div>
        ))}
      </div>

      <button onClick={onContinue} style={{ padding: "13px 40px", background: "linear-gradient(135deg,#8abd24,#6a9a1a)", border: "none", borderRadius: 30, color: "#fff", fontFamily: FONT, fontSize: "1rem", fontWeight: 700, cursor: "pointer", letterSpacing: 1, boxShadow: "0 4px 20px rgba(138,189,36,0.4)" }}>
        VIEW LEADERBOARD 🏆
      </button>
    </div>
  );
}

// ─── OIL RIG CELEBRATION ───
function OilRigCelebration({ time, onClose }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = (canvas.width = 500);
    const H = (canvas.height = 500);
    let particles = [];
    let frame = 0;
    let animId;

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = W / 2 + (Math.random() - 0.5) * 30;
        this.y = 240;
        this.vx = (Math.random() - 0.5) * 5;
        this.vy = -(Math.random() * 8 + 4);
        this.life = 1;
        this.decay = Math.random() * 0.015 + 0.005;
        this.size = Math.random() * 6 + 3;
        this.type = Math.random() > 0.4 ? "oil" : "spark";
        this.color =
          this.type === "oil"
            ? `hsl(${30 + Math.random() * 20},90%,${15 + Math.random() * 20}%)`
            : `hsl(${40 + Math.random() * 30},100%,${60 + Math.random() * 30}%)`;
        this.gravity = 0.12;
        this.trail = [];
      }
      update() {
        this.trail.push({ x: this.x, y: this.y, life: this.life });
        if (this.trail.length > 6) this.trail.shift();
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
      }
      draw(ctx) {
        this.trail.forEach((t, i) => {
          ctx.globalAlpha = t.life * 0.3 * (i / this.trail.length);
          ctx.fillStyle = this.color;
          ctx.beginPath();
          ctx.arc(t.x, t.y, this.size * 0.5, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = this.life;
        if (this.type === "spark") {
          ctx.shadowColor = this.color;
          ctx.shadowBlur = 15;
        }
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.type === "spark" ? this.size * 0.7 : this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
    }

    function drawRig(ctx) {
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#002530");
      sky.addColorStop(0.6, "#003d4d");
      sky.addColorStop(1, "#004750");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "#fff";
      for (let i = 0; i < 60; i++) {
        const sx = (Math.sin(i * 127.1 + 311.7) * 0.5 + 0.5) * W;
        const sy = (Math.sin(i * 269.5 + 183.3) * 0.5 + 0.5) * H * 0.5;
        const ss = Math.sin(frame * 0.05 + i) * 0.5 + 1;
        ctx.globalAlpha = 0.3 + Math.sin(frame * 0.03 + i) * 0.3;
        ctx.beginPath();
        ctx.arc(sx, sy, ss, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.fillStyle = "#1a0f00";
      ctx.fillRect(0, H - 80, W, 80);
      ctx.fillStyle = "#2a1a00";
      ctx.fillRect(0, H - 80, W, 3);

      const cx = W / 2;
      const baseY = H - 80;
      const topY = 250;

      ctx.strokeStyle = "#4a3520";
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(cx - 50, baseY); ctx.lineTo(cx - 12, topY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + 50, baseY); ctx.lineTo(cx + 12, topY); ctx.stroke();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "#3a2510";
      for (let i = 0; i < 8; i++) {
        const t = i / 8;
        const y1 = baseY + (topY - baseY) * t;
        const y2 = baseY + (topY - baseY) * (t + 0.125);
        const lx1 = cx - 50 + 38 * t;
        const rx1 = cx + 50 - 38 * t;
        const lx2 = cx - 50 + 38 * (t + 0.125);
        const rx2 = cx + 50 - 38 * (t + 0.125);
        ctx.beginPath(); ctx.moveTo(lx1, y1); ctx.lineTo(rx2, y2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rx1, y1); ctx.lineTo(lx2, y2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(lx1, y1); ctx.lineTo(rx1, y1); ctx.stroke();
      }

      ctx.fillStyle = "#5a4530";
      ctx.fillRect(cx - 15, topY - 10, 30, 15);
      ctx.fillStyle = "#666";
      ctx.fillRect(cx - 4, topY - 20, 8, 15);
      ctx.fillStyle = "#3a2510";
      ctx.fillRect(cx - 60, baseY - 15, 120, 18);

      ctx.fillStyle = "#2a1a08";
      ctx.fillRect(cx + 55, baseY - 45, 50, 45);
      ctx.fillStyle = "#ffa500";
      ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1) * 0.2;
      ctx.fillRect(cx + 65, baseY - 35, 12, 10);
      ctx.fillRect(cx + 83, baseY - 35, 12, 10);
      ctx.globalAlpha = 1;

      ctx.fillStyle = `rgba(255,0,0,${0.5 + Math.sin(frame * 0.15) * 0.5})`;
      ctx.shadowColor = "red";
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(cx, topY - 25, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function animate() {
      drawRig(ctx);
      if (frame < 300) for (let i = 0; i < 5; i++) particles.push(new Particle());
      particles = particles.filter((p) => p.life > 0);
      particles.forEach((p) => { p.update(); p.draw(ctx); });

      const glow = ctx.createRadialGradient(W / 2, 240, 5, W / 2, 240, 60);
      glow.addColorStop(0, `rgba(255,160,0,${0.4 + Math.sin(frame * 0.1) * 0.2})`);
      glow.addColorStop(1, "rgba(255,100,0,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(W / 2, 240, 60, 0, Math.PI * 2);
      ctx.fill();

      frame++;
      animId = requestAnimationFrame(animate);
    }
    animate();
    return () => cancelAnimationFrame(animId);
  }, []);

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "rgba(0,47,50,0.92)", backdropFilter: "blur(10px)" }}>
      <div style={{ fontFamily: "'Interstate', 'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif", fontWeight: 700, fontSize: "2rem", color: "#8abd24", textShadow: "0 0 20px rgba(138,189,36,0.8)", marginBottom: 8, letterSpacing: 2 }}>
        🏆 CONGRATULATIONS! 🏆
      </div>
      <div style={{ fontFamily: "'Interstate', 'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif", fontSize: "1.1rem", color: "#ccc", marginBottom: 16 }}>
        Time: <span style={{ color: "#8abd24", fontWeight: 700 }}>{formatTime(time)}</span>
      </div>
      <canvas ref={canvasRef} style={{ width: 360, height: 360, borderRadius: 16, boxShadow: "0 0 60px rgba(0,128,164,0.4)" }} />
      <button onClick={onClose} style={{ marginTop: 20, padding: "12px 40px", background: "linear-gradient(135deg,#8abd24,#6a9a1a)", border: "none", borderRadius: 30, color: "#fff", fontFamily: "'Interstate', 'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif", fontSize: "1rem", fontWeight: 700, cursor: "pointer", letterSpacing: 1, boxShadow: "0 4px 20px rgba(138,189,36,0.5)" }}>
        CLOSE

  );
}

// ─── MAIN ───
function EnergyValuesGame() {
  const [screen, setScreen] = useState("name");
  const [playerName, setPlayerName] = useState("");
  const [cards, setCards] = useState([]);
  const [flipped, setFlipped] = useState([]);
  const [matched, setMatched] = useState(new Set());
  const [timer, setTimer] = useState(0);
  const [running, setRunning] = useState(false);
  const [moves, setMoves] = useState(0);
  const [scores, setScores] = useState([]);
  const [locked, setLocked] = useState(false);
  const [finalTime, setFinalTime] = useState(0);
  const timerRef = useRef(null);

  useEffect(() => {
    try {
      const r = gameStorage.get("energy-values-leaderboard");
      if (r && r.value) setScores(JSON.parse(r.value));
    } catch (_) {}
  }, []);

  const saveScores = useCallback((ns) => {
    try { gameStorage.set("energy-values-leaderboard", JSON.stringify(ns)); } catch (_) {}
  }, []);

  useEffect(() => {
    if (running) timerRef.current = setInterval(() => setTimer((t) => t + 1), 1000);
    return () => clearInterval(timerRef.current);
  }, [running]);

  const startGame = useCallback((name) => {
    setPlayerName(name);
    setCards(buildDeck());
    setFlipped([]);
    setMatched(new Set());
    setTimer(0);
    setMoves(0);
    setRunning(false);
    setLocked(false);
    setScreen("game");
  }, []);

  const handleCardClick = useCallback(
    (index) => {
      if (locked) return;
      const card = cards[index];
      if (matched.has(card.pairId) || flipped.includes(index)) return;
      if (!running) setRunning(true);

      if (flipped.length === 0) {
        setFlipped([index]);
      } else if (flipped.length === 1) {
        setFlipped([...flipped, index]);
        setMoves((m) => m + 1);
        setLocked(true);

        const first = cards[flipped[0]];
        const second = cards[index];

        if (first.pairId === second.pairId) {
          const nm = new Set(matched);
          nm.add(first.pairId);
          setMatched(nm);
          setFlipped([]);
          setLocked(false);

          if (nm.size === PAIRS) {
            setRunning(false);
            clearInterval(timerRef.current);
            setTimer((prev) => {
              setFinalTime(prev);
              const ns = [...scores, { name: playerName, time: prev }].sort((a, b) => a.time - b.time);
              setScores(ns);
              saveScores(ns);
              setTimeout(() => setScreen("celebration"), 600);
              return prev;
            });
          }
        } else {
          setTimeout(() => { setFlipped([]); setLocked(false); }, 900);
        }
      }
    },
    [cards, flipped, matched, locked, running, playerName, scores, saveScores]
  );

  if (screen === "name") return <NameInput onStart={startGame} onLeaderboard={() => setScreen("leaderboard")} />;
  if (screen === "leaderboard") return <Leaderboard scores={scores} onBack={() => setScreen("name")} />;
  if (screen === "celebration") return <OilRigCelebration time={finalTime} onClose={() => setScreen("values")} />;
  if (screen === "values") return <ValuesGallery time={finalTime} onContinue={() => setScreen("leaderboard")} />;

  return (
    <div style={{ minHeight: "100vh", background: "#004750", fontFamily: "'Interstate', 'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif", display: "flex", flexDirection: "column", alignItems: "center", padding: "20px 12px", position: "relative" }}>
      

      {/* Logo top-left */}
      <div style={{ position: "absolute", top: 16, left: 16 }}>
        <LogoBadge size="small" />
      </div>

      {/* Header */}
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: 16 }}>
        <div style={{ fontFamily: "'Interstate', 'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif", fontWeight: 700, fontSize: "1.3rem", color: "#8abd24", textShadow: "0 0 15px rgba(138,189,36,0.3)" }}>
          GENEL ENERGY VALUES
        </div>
        <span style={{ color: "#3da1be", fontSize: "0.7rem", letterSpacing: 3 }}>MEMORY CHALLENGE</span>
      </div>

      {/* Stats */}
      <div style={{ display: "flex", gap: 12, marginBottom: 18, flexWrap: "wrap", justifyContent: "center" }}>
        {[
          { label: "TIME", value: formatTime(timer), color: "#65adc7" },
          { label: "MOVES", value: moves, color: "#8abd24" },
          { label: "MATCHED", value: `${matched.size}/${PAIRS}`, color: "#3da1be" },
        ].map((st, i) => (
          <div key={i} style={{ background: "rgba(0,0,0,0.2)", border: "1px solid rgba(61,161,190,0.3)", borderRadius: 10, padding: "8px 16px", textAlign: "center", minWidth: 80 }}>
            <div style={{ fontSize: "0.65rem", color: "#65adc7", letterSpacing: 2, marginBottom: 3 }}>{st.label}</div>
            <div style={{ fontSize: "1.25rem", fontWeight: 700, fontFamily: "'Fira Code', 'Courier New', monospace", color: st.color }}>{st.value}</div>
          </div>
        ))}
      </div>

      {/* Card grid: 12 cards in 4 columns × 3 rows */}
      <div style={{
        display: "grid",
        gridTemplateColumns: "repeat(4, 1fr)",
        gap: 10,
        width: "100%",
        maxWidth: 380,
        padding: 4,
      }}>
        {cards.map((card, i) => (
          <Card
            key={`${card.pairId}-${i}`}
            card={card}
            isFlipped={flipped.includes(i)}
            isMatched={matched.has(card.pairId)}
            onClick={() => handleCardClick(i)}
          />
        ))}
      </div>

      {/* Buttons */}
      <div style={{ display: "flex", gap: 10, marginTop: 22, flexWrap: "wrap", justifyContent: "center" }}>
        <button onClick={() => startGame(playerName)} style={{ padding: "9px 20px", background: "rgba(0,128,164,0.15)", border: "1px solid rgba(61,161,190,0.3)", borderRadius: 20, color: "#bbd5e3", fontFamily: "'Interstate', 'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif", fontSize: "0.8rem", cursor: "pointer" }}>
          🔄 Restart
        </button>
        <button onClick={() => setScreen("leaderboard")} style={{ padding: "9px 20px", background: "rgba(138,189,36,0.1)", border: "1px solid rgba(138,189,36,0.3)", borderRadius: 20, color: "#8abd24", fontFamily: "'Interstate', 'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif", fontSize: "0.8rem", cursor: "pointer" }}>
          🏆 Leaderboard
        </button>
        <button onClick={() => setScreen("name")} style={{ padding: "9px 20px", background: "rgba(0,128,164,0.15)", border: "1px solid rgba(61,161,190,0.3)", borderRadius: 20, color: "#bbd5e3", fontFamily: "'Interstate', 'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif", fontSize: "0.8rem", cursor: "pointer" }}>
          ← Menu
        </button>
      </div>

      <div style={{ marginTop: 14, color: "rgba(101,173,199,0.4)", fontSize: "0.7rem", textAlign: "center" }}>
        Player: {playerName}
      </div>
    </div>
  );
}


// Replace window.storage calls with gameStorage
// (already handled inline below)

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(EnergyValuesGame));
</script>
</body>
